baseURL = 'https://hrmn.ai/'
languageCode = 'en-us'
title = 'Hermeneutic AI'
enableRobotsTXT = true

# Keep the taxonomy *list* page (/authors/) off, but keep individual
# author term pages (/authors/<name>/) on.
disableKinds = ['taxonomy']

# Single taxonomy: research-note authors. Defining [taxonomies] replaces
# Hugo's default tags/categories, so only 'authors' exists.
[taxonomies]
  author = 'authors'

[params]
  description = 'A social science research lab studying interpretive artificial intelligence for sociologists, anthropologists, and the interpretive humanities.'
  email = 'contact@hrmn.ai'

  # Cloudflare Web Analytics — cookieless, no consent banner required.
  # Paste the token from your Cloudflare dashboard (Analytics → Web Analytics).
  # The beacon only loads on production builds; leave blank to disable.
  cloudflareAnalyticsToken = ''

  # Buttondown newsletter — the subscribe box on /contact/ posts to this account.
  # Set this to your Buttondown username (the site never stores emails itself;
  # Buttondown holds the list). Leave blank to hide the subscribe box.
  buttondownUsername = 'hermeneuticAI'

[[menu.main]]
  name = 'About'
  pageRef = '/about'
  weight = 10

[[menu.main]]
  name = 'Research Notes'
  pageRef = '/notes'
  weight = 20

[[menu.main]]
  name = 'Tools'
  pageRef = '/tools'
  weight = 30

[[menu.main]]
  name = 'Contact'
  pageRef = '/contact'
  weight = 40

[markup.goldmark.renderer]
  unsafe = true
