{{ define "main" }}
<article>
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.status }}<p class="meta"><span class="status">{{ . }}</span></p>{{ end }}
  </header>
  <div class="prose">
    {{ .Content }}
  </div>
</article>
{{ with .Params.monitors }}
{{ $first := index . 0 }}
<div class="embed-full monitor-shell">
  <nav class="monitor-tabs" aria-label="Monitor feeds">
    {{ range $i, $m := . }}
    <button type="button" class="monitor-tab{{ if eq $i 0 }} active{{ end }}" data-src="{{ $m.src }}">{{ $m.label }}</button>
    {{ end }}
  </nav>
  <iframe class="monitor-frame" src="{{ $first.src }}" title="{{ $.Title }}" loading="lazy" scrolling="no" allow="fullscreen" referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>
<p class="embed-fallback">If the panel doesn't load, <a class="monitor-open" href="{{ $first.src }}" target="_blank" rel="noopener">open the current feed in a new tab</a>.</p>
<script>
(function () {
  var shell = document.querySelector('.monitor-shell');
  if (!shell) return;
  var frame = shell.querySelector('.monitor-frame');
  var open = document.querySelector('.monitor-open');
  var tabs = shell.querySelectorAll('.monitor-tab');

  function frameOrigin() {
    try { return new URL(frame.src, location.href).origin; } catch (e) { return null; }
  }

  // Auto-fit: if the embedded page reports its content height via
  // postMessage({ type: 'monitor-embed-height', height: <px> }), size the
  // iframe to match so the whole feed loads without a secondary scrollbar.
  // (Cross-origin content height can't be read directly, so the embed must
  // send it; until then the tall CSS fallback keeps scrolling minimal.)
  window.addEventListener('message', function (e) {
    if (e.origin !== frameOrigin()) return;
    var d = e.data;
    if (!d || d.type !== 'monitor-embed-height') return;
    var h = parseFloat(d.height);
    if (!isNaN(h) && h > 0) {
      frame.style.height = Math.max(Math.round(h), 400) + 'px';
    }
  });

  tabs.forEach(function (tab) {
    tab.addEventListener('click', function () {
      if (tab.classList.contains('active')) return;
      tabs.forEach(function (t) { t.classList.remove('active'); });
      tab.classList.add('active');
      var src = tab.getAttribute('data-src');
      frame.style.height = '';        // reset to CSS fallback; new frame re-reports
      frame.src = src;
      if (open) open.href = src;
    });
  });
})();
</script>
{{ end }}
{{ end }}
