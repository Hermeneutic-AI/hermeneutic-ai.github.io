baseURL = 'https://hrmn.ai/'
languageCode = 'en-us'
title = 'Hermeneutic AI'
enableRobotsTXT = true

# Keep the taxonomy *list* page (/authors/) off, but keep individual
# author term pages (/authors/<name>/) on.
disableKinds = ['taxonomy']

# Single taxonomy: research-note authors. Defining [taxonomies] replaces
# Hugo's default tags/categories, so only 'authors' exists.
[taxonomies]
  author = 'authors'

[params]
  description = 'A social science research lab studying interpretive artificial intelligence for sociologists, anthropologists, and the interpretive humanities.'
  email = 'contact@hrmn.ai'

[[menu.main]]
  name = 'About'
  pageRef = '/about'
  weight = 10

[[menu.main]]
  name = 'Research Notes'
  pageRef = '/notes'
  weight = 20

[[menu.main]]
  name = 'Tools'
  pageRef = '/tools'
  weight = 30

[[menu.main]]
  name = 'Contact'
  pageRef = '/contact'
  weight = 40

[markup.goldmark.renderer]
  unsafe = true
